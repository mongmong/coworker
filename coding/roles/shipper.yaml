name: shipper
concurrency: single
cli: claude-code
prompt_template: prompts/shipper.md
inputs:
  required:
    - plan_path
    - branch
    - title
outputs:
  contract:
    pr_url_emitted: true
    post_exec_report_present: true
  emits:
    artifacts:
      - kind: pr-url
sandbox: workspace-write
permissions:
  allowed_tools:
    - read
    - "bash:git"
    - "bash:gh"
    - "bash:claude"
  never:
    - "bash:rm -rf"
  requires_human: []
budget:
  max_tokens_per_job: 100000
  max_wallclock_minutes: 15
  max_cost_usd: 2.00
retry_policy:
  on_contract_fail: retry_with_feedback
  on_job_error: retry_once
